<style>
  :root{
    --bg: #FAF6EE;
    --bg-alt: #F1E7D0;
    --ink: #2A2621;
    --ink-soft: #6B6357;
    --green: #3E5641;
    --green-dark: #263A29;
    --gold: #B8863B;
    --gold-light: #E4C687;
    --line: #E5DAC0;
    --card: #FFFFFF;
    --radius: 16px;
    --shadow: 0 16px 36px -18px rgba(38,58,41,0.35);
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--ink);
    font-family:'Manrope', system-ui, sans-serif; line-height:1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Cormorant Garamond', Georgia, serif;
    font-weight:600; line-height:1.1; letter-spacing:0.005em; margin:0; color: var(--green-dark);
  }
  p{ margin:0; }
  a{ color:inherit; text-decoration:none; }
  img{ max-width:100%; display:block; }
  .wrap{ max-width:1140px; margin:0 auto; padding:0 24px; }
  .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;

  }
  .eyebrow::after{ content:""; flex:1; height:1px; background: var(--line); }
  section{ padding:84px 0; }

  .btn{
    display:inline-flex; align-items:center; gap:9px; padding:15px 28px;

    border:1.5px solid transparent; cursor:pointer; white-space:nowrap;
  }
  .btn-gold{ background: var(--gold); color:#fff; }
  .btn-gold:hover{ background:#9c7130; }
  .btn-line{ background:transparent; border-color: rgba(255,255,255,0.55); color:#fff; }
  .btn-line:hover{ background:#fff; color: var(--green-dark); }
  .btn-dark{ background: var(--green-dark); color:#fff; }

  header{
    position:sticky; top:0; z-index:50;
    background: rgba(250,246,238,0.94); backdrop-filter: blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:1140px; margin:0 auto; }
  .brand .name{ font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:700; color: var(--green-dark); }
  .brand .loc{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color: var(--gold); margin-top:2px; }
  .nav-links{ display:flex; gap:30px; }
  .nav-links a{ font-size:14px; font-weight:500; color: var(--ink-soft); }
  .nav-links a:hover{ color: var(--green-dark); }
  .nav-actions .btn{ padding:10px 20px; font-size:13.5px; }
  .burger{ display:none; background:none; border:none; }
  .burger svg{ width:24px; height:24px; }
  @media (max-width:880px){ .nav-links{ display:none; } .burger{ display:block; } }

  /* Hero */
  .hero{ position:relative; padding:0; }
  .hero-bg{
    background: linear-gradient(160deg, var(--green-dark), var(--green) 60%);
    padding:88px 0 130px; position:relative; overflow:hidden;
  }
  .hero-bg::before{
    content:""; position:absolute; top:-100px; right:-140px; width:460px; height:460px;
    border-radius:50%; background: radial-gradient(circle, rgba(184,134,59,0.25), transparent 70%);
  }
  .hero-inner{ position:relative; color:#fff; max-width:640px; }
  .hero-inner .eyebrow{ color: var(--gold-light); }
  .hero-inner .eyebrow::after{ background: rgba(255,255,255,0.25); }
  .hero-inner h1{ color:#fff; font-size:clamp(34px,5vw,54px); margin-top:18px; }
  .hero-inner h1 em{ font-style:italic; color: var(--gold-light); }
  .hero-inner p{ color: rgba(255,255,255,0.82); font-size:16.5px; margin-top:18px; max-width:480px; }
  .hero-actions{ display:flex; gap:14px; margin-top:32px; flex-wrap:wrap; }

  /* Booking card overlapping hero */
  .booking-card{
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    max-width:1000px; margin:-70px auto 0; position:relative; z-index:5;
    padding:28px 30px; display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:20px; align-items:end;
  }
  @media (max-width:820px){ .booking-card{ grid-template-columns:1fr 1fr; } }
  .field label{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.08em; color: var(--ink-soft); font-weight:700; }

  .booking-card .btn{ width:100%; justify-content:center; }

  /* Trust strip */
  .trust{ background: var(--bg-alt); margin-top:50px; }

  @media (max-width:760px){ .trust .wrap{ grid-template-columns:repeat(2,1fr); } }
  .trust-item .num{ font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:700; color: var(--green-dark); }
  .trust-item .lbl{ font-size:12px; color: var(--ink-soft); margin-top:3px; }

  /* Rooms */
  .section-head{ max-width:600px; margin-bottom:44px; }
  .section-head h2{ font-size:clamp(28px,3.4vw,40px); margin-top:14px; }
  .section-head p{ color: var(--ink-soft); margin-top:14px; font-size:15.5px; }

  .rooms-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
  @media (max-width:900px){ .rooms-grid{ grid-template-columns:1fr 1fr; } }
  @media (max-width:600px){ .rooms-grid{ grid-template-columns:1fr; } }
  .room-card{
    background: var(--card); border-radius: var(--radius); overflow:hidden; border:1px solid var(--line);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .room-card:hover{ transform: translateY(-4px); box-shadow: var(--shadow); }
  .room-img{
    height:160px; background: linear-gradient(135deg, var(--green), var(--green-dark));
    display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.85);
  }
  .room-img svg{ width:40px; height:40px; }
  .room-body{ padding:22px; }
  .room-body h3{ font-size:20px; font-weight:700; }
  .room-body .price{ color: var(--gold); font-weight:700; font-size:15px; margin-top:6px; font-family:'Manrope',sans-serif; }
  .room-body .price span{ font-weight:500; color: var(--ink-soft); font-size:13px; }
